<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krishi Mitra AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="bot_image.png">
</head>
<body>

    <!-- ===== AUTH OVERLAY ===== -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-bg-art">
            <div class="leaf leaf1">🌿</div>
            <div class="leaf leaf2">🌾</div>
            <div class="leaf leaf3">🍃</div>
            <div class="leaf leaf4">🌱</div>
        </div>

        <div class="auth-card">
            <div class="auth-brand">
                <img src="bot_image.png" class="auth-bot-img" alt="bot">
                <h1 class="auth-title">कृषी मित्र</h1>
                <p class="auth-sub">Your AI Farming Assistant</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2 class="form-heading">Welcome Back 👋</h2>
                <div class="input-group">
                    <span class="input-icon">📧</span>
                    <input type="email" id="loginEmail" placeholder="Email address" autocomplete="off">
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <div id="loginError" class="auth-error"></div>
                <button class="auth-btn" onclick="handleLogin()">Login</button>
                <p class="auth-switch">Don't have an account? <span onclick="showSignup()">Sign Up</span></p>
                <button class="guest-btn" onclick="guestLogin()">Continue as Guest</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <h2 class="form-heading">Create Account 🌱</h2>
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="signupName" placeholder="Your name">
                </div>
                <div class="input-group">
                    <span class="input-icon">📧</span>
                    <input type="email" id="signupEmail" placeholder="Email address">
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="signupPassword" placeholder="Create password">
                </div>
                <div id="signupError" class="auth-error"></div>
                <button class="auth-btn" onclick="handleSignup()">Create Account</button>
                <p class="auth-switch">Already have an account? <span onclick="showLogin()">Login</span></p>
                <button class="guest-btn" onclick="guestLogin()">Continue as Guest</button>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CHAT APP ===== -->
    <div id="mainApp" class="main-app hidden">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <img src="bot_image.png" class="side-bot-img" alt="bot">
                <div>
                    <p class="side-title" id="side-title">कृषी मित्र</p>
                    <span class="status-pill">● <span id="side-status">सज्ज</span></span>
                </div>
            </div>

            <nav class="side-nav">
                <p class="nav-label">LANGUAGE</p>
                <button class="lang-btn active" id="btn-mr" onclick="updateLanguage('Marathi')">🇮🇳 मराठी</button>
                <button class="lang-btn" id="btn-hi" onclick="updateLanguage('Hindi')">🇮🇳 हिंदी</button>
                <button class="lang-btn" id="btn-en" onclick="updateLanguage('English')">🌐 English</button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-chip">
                    <span class="user-avatar" id="userAvatarIcon">👤</span>
                    <div>
                        <p class="user-name" id="userDisplayName">Guest</p>
                        <p class="user-email" id="userDisplayEmail">guest@krishi.ai</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="handleLogout()">⬅ Logout</button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-main">
            <div class="chat-topbar">
                <div class="chat-topbar-left">
                    <div class="online-dot"></div>
                    <span id="ui-title">कृषी मित्र</span>
                    <span class="topbar-sub" id="ai-status">सज्ज आहे</span>
                </div>
                <div class="weather-badge" id="weatherBadge"></div>
                <div class="mobile-header">
    <span onclick="updateLanguage('Marathi')">🇮🇳 MR</span>
    <span onclick="updateLanguage('Hindi')">🇮🇳 HI</span>
    <span onclick="updateLanguage('English')">🌐 EN</span>
</div>
            </div>

            <div id="chatBox" class="chat-box"></div>

            <footer class="input-section">
                <button class="mic-btn" onclick="startVoice()" title="Voice input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <input type="text" id="input" placeholder="येथे बोला किंवा लिहा..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()" id="ui-send">
                    पाठवा
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
